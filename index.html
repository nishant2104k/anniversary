<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaiya Bhabhi Anniversary Special</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; overflow: hidden; }

        /* Background - Poora dikhega, face nahi katega */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat;
            background-position: center; z-index: -2; filter: brightness(0.4);
        }

        .screen {
            height: 100vh; width: 100%; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: absolute; z-index: 10;
        }
        .active { display: flex; animation: fadeIn 1s forwards; }

        .glass {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.3);
            width: 85%; max-width: 400px;
        }

        h1 { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: #ffd700; }

        /* --- BOX & RING --- */
        .box-container { perspective: 1000px; cursor: pointer; height: 220px; display: flex; align-items: flex-end; position: relative; }
        .box-lid { width: 150px; height: 80px; background: #660000; border-radius: 5px; position: absolute; bottom: 100px; transform-origin: bottom; transition: 1.5s; z-index: 3; border: 1px solid #333; }
        .box-bottom { width: 150px; height: 100px; background: #1a1a1a; position: relative; border: 1px solid #333; z-index: 1; }
        .box-bottom::before { content: ""; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px; background: #4a0000; border-radius: 5px; }
        .ring-group { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) scale(0); transition: 1.2s; z-index: 2; opacity: 0; }
        .ring-circle { width: 40px; height: 40px; border: 5px solid #e0e0e0; border-radius: 50%; box-shadow: 0 0 10px #fff; }
        .ring-diamond { width: 15px; height: 15px; background: #fff; position: absolute; top: -8px; left: 50%; transform: translateX(-50%) rotate(45deg); box-shadow: 0 0 15px skyblue; }
        .open .box-lid { transform: rotateX(-120deg); }
        .open .ring-group { transform: translateX(-50%) scale(1.3) translateY(-30px); opacity: 1; }

        /* VIDEO */
        .video-frame { width: 85%; max-width: 300px; aspect-ratio: 9/16; border: 3px solid #ffd700; border-radius: 15px; overflow: hidden; background: #000; }
        #vid { width: 100%; height: 100%; object-fit: contain; }

        /* ALBUM CARDS */
        .card { position: absolute; width: 260px; background: white; padding: 10px; border-radius: 15px; color: black; transition: 1.2s ease-in-out; opacity: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: auto; max-height: 300px; object-fit: contain; border-radius: 10px; }
        
        /* PARALLAX GALLERY */
        #parallax-section { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30; overflow: hidden; }
        .horizontal-scroll-wrapper {
            display: flex; flex-direction: column; align-items: center; width: 100vh;
            transform: rotate(-90deg) translate3d(0, -100vh, 0); transform-origin: right top;
            overflow-y: auto; height: 100vw; perspective: 1px; transform-style: preserve-3d; padding-bottom: 20rem;
        }
        .img-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 50vh; transform: rotate(90deg) translateZ(.1px) scale(0.8); margin: 50px 0;
        }
        .img-wrapper img { width: 75vw; max-width: 300px; height: auto; object-fit: contain; border: 5px solid white; }
        .img-caption { color: #ffd700; margin-top: 10px; font-family: 'Great Vibes', cursive; font-size: 1.5rem; }

        /* Music Button */
        #music-control {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            background: rgba(255, 215, 0, 0.2); border: 1px solid #ffd700;
            border-radius: 50%; width: 45px; height: 45px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        button { padding: 12px 25px; background: #ffd700; color: #000; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop src="WhatsApp Audio 2026-03-02 at 8.03.07 PM.mpeg"></audio>
    
    <div id="music-control" onclick="toggleMusic()">🎵</div>

    <div id="bg-layer"></div>

    <div id="s1" class="screen active">
        <div class="glass">
            <h1>Happy Anniversary</h1>
            <h2 style="color:white">Bhai ❤️ Bhabhi   
                </h2>
            <div id="typing-text" style="margin: 15px 0; font-size: 0.9rem;"></div>
            <button onclick="startCelebration()">Start Celebration ✨</button>
        </div>
    </div>

    <div id="s2" class="screen">
        <div class="box-container" id="box" onclick="unbox()">
            <div class="box-lid"></div>
            <div class="ring-group"><div class="ring-diamond"></div><div class="ring-circle"></div></div>
            <div class="box-bottom"></div>
        </div>
        <h2 style="color: #ffd700; margin-top: 30px;">Surprise Box ko tap karein!</h2>
    </div>

    <div id="s3" class="screen">
        <div class="video-frame">
            <video id="vid" playsinline>
                <source src="WhatsApp Video 2026-03-02 at 11.37.53 AM.mp4" type="video/mp4">
            </video>
        </div>
        <button onclick="forceNext()">next step</button>
    </div>

    <div id="s4" class="screen">
        <div class="glass">
            <h2 style="color: #ffd700; font-family: 'Great Vibes';">Forever Together</h2>
            <img src="20251024_172655.jpg" style="width: 100%; max-height: 350px; object-fit: contain; border: 3px solid white; border-radius: 10px; margin-top:15px;">
        </div>
    </div>

    <div id="s5" class="screen">
        <div id="album-container" style="position: relative; width: 100%; height: 380px;"></div>
        <div class="glass" style="margin-top: 20px;"><h2 id="caption" style="color: #ffd700;"></h2></div>
    </div>

    <div id="heart-canvas-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; background: #000;">
        <canvas id="heart"></canvas>
    </div>

    <div id="parallax-section">
        <div class="horizontal-scroll-wrapper">
            <div class="img-wrapper"><img src="WhatsApp Image 2026-03-02 at 2.00.41 PM.jpeg"><div class="img-caption">Love</div></div>
            <div class="img-wrapper"><img src="WhatsApp Image 2026-03-02 at 7.35.14 PM.jpeg"><div class="img-caption">handsome</div></div>
            <div class="img-wrapper"><img src="WhatsApp Image 2026-03-02 at 9.25.08 AM.jpeg"><div class="img-caption">Beautiful</div></div>
            <div class="img-wrapper"><img src="WhatsApp Image 2026-03-02 at 7.34.26 PM.jpeg"><div class="img-caption">Forever</div></div>
            <div class="img-wrapper"><img src="WhatsApp Image 2026-03-02 at 2.00.41 PM (1).jpeg"><div class="img-caption">Happiness</div></div>
            <div class="img-wrapper"><img src="WhatsApp Image 2026-03-02 at 9.23.24 AM.jpeg"><div class="img-caption">best couple</div></div>
            <div class="img-wrapper"><img src="DSC03932.JPG"><div class="img-caption">Soulmates</div></div>
            <div class="img-wrapper"><img src="DSC03886.JPG"><div class="img-caption">Great </div></div>
            <div class="img-wrapper"><img src="IMG-20260301-WA0002 - Copy.jpg"><div class="img-caption">perfect pair </div></div>
            <div class="img-wrapper"><img src="DSC03932.JPG"><div class="img-caption"> Perfect picture <picture></picture></div></div>
        </div>
    </div>

    <script>
        const bg = document.getElementById('bg-layer');
        const music = document.getElementById('bgMusic');
        bg.style.backgroundImage = "url('AfA3o9x2MOX0TFeo2cUHqCkReipGgBTIBz7sXwZI6lqeoOLEUVfMwJLTZSQGXws.jpg')";

        function toggleMusic() {
            if (music.paused) { music.play(); document.getElementById('music-control').innerHTML = "🎵"; }
            else { music.pause(); document.getElementById('music-control').innerHTML = "🔇"; }
        }

        function startCelebration() {
            music.play(); // Click par music shuru
            change(1, 2, 'IMG-20260301-WA0002 - Copy.jpg');
        }

        const text = "Aap dono ka saath hamesha aise hi muskurata rahe, har saal aapki mohabbat aur gehri hoti rahe.”✨  ";
        let index = 0;
        function typeWriter() { if (index < text.length) { document.getElementById("typing-text").innerHTML += text.charAt(index); index++; setTimeout(typeWriter, 50); } }

        function change(h, s, nextBg) {
            document.getElementById('s' + h).classList.remove('active');
            document.getElementById('s' + s).classList.add('active');
            if(nextBg) bg.style.backgroundImage = `url('${nextBg}')`;
        }

        function unbox() {
            document.getElementById('box').classList.add('open');
            confetti({ particleCount: 150, spread: 70 });
            setTimeout(() => {
                change(2, 3, 'WhatsApp Image 2026-03-02 at 9.29.53 PM.jpeg');
                const v = document.getElementById('vid');
                music.pause(); // Video ke liye music stop
                v.play();
                v.onended = () => forceNext();
            }, 3000);
        }

        function forceNext() {
            document.getElementById('vid').pause();
            music.play(); // Video khatam, music wapas chalu
            change(3, 4, 'DSC03913.JPG');
            setTimeout(() => { change(4, 5); startAlbum(); }, 4000);
        }

        const albumData = [
            {img: '20251010_211741.jpg', t: " Perfect Couple"}, 
            {img: 'WhatsApp Image 2026-03-01 at 10.19.52 PM.jpeg', t: "Pyaar aur respect ki misaa"},
            {img: '20251024_111550.jpg', t: "Ekdum perfect jodi 💕"}, 
            {img: 'IMG-20241021-WA0061.jpg', t: "Best Moments"}
        ];

        let albumIdx = 0;
        function startAlbum() {
            if(albumIdx < albumData.length) {
                const wrap = document.getElementById('album-container');
                const d = albumData[albumIdx];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${d.img}">`;
                wrap.innerHTML = "";
                wrap.appendChild(card);
                setTimeout(() => { card.style.opacity = '1'; document.getElementById('caption').innerText = d.t; }, 100);
                setTimeout(() => { card.style.opacity = '0'; setTimeout(() => { albumIdx++; startAlbum(); }, 1000); }, 3000);
            } else {
                document.getElementById('s5').classList.remove('active');
                startHeartAnimation();
            }
        }

        function startHeartAnimation() {
            document.getElementById('heart-canvas-container').style.display = 'block';
            var canvas = document.getElementById('heart'); var ctx = canvas.getContext('2d');
            var width = canvas.width = innerWidth; var height = canvas.height = innerHeight;
            var heartPosition = (rad) => [16 * Math.pow(Math.sin(rad), 3), -(13 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))];
            var scale = (pos, s, dx, dy) => [dx + pos[0] * s, dy + pos[1] * s];
            var points = []; for (var i = 0; i < Math.PI * 2; i += 0.1) points.push(scale(heartPosition(i), 12, 0, 0));
            var e = []; for (var i = 0; i < points.length; i++) { e[i] = { vx: 0, vy: 0, R: 2, speed: Math.random() + 5, q: ~~(Math.random() * points.length), D: 2 * (i % 2) - 1, force: 0.7, f: "hsla(0,100%,50%,.3)", trace: Array.from({length: 20}, () => ({x: Math.random()*width, y: Math.random()*height})) }; }

            var time = 0;
            var loop = function () {
                var n = -Math.cos(time); var k = (1 + n) * .5; time += 0.01;
                ctx.fillStyle = "rgba(0,0,0,.1)"; ctx.fillRect(0, 0, width, height);
                for (var i = e.length; i--;) {
                    var u = e[i]; var q = [k * points[u.q][0] + width / 2, k * points[u.q][1] + height / 2];
                    var dx = u.trace[0].x - q[0]; var dy = u.trace[0].y - q[1]; var len = Math.sqrt(dx * dx + dy * dy);
                    if (10 > len) u.q = (u.q + u.D + points.length) % points.length;
                    u.vx += -dx / len * u.speed; u.vy += -dy / len * u.speed; u.trace[0].x += u.vx; u.trace[0].y += u.vy; u.vx *= u.force; u.vy *= u.force;
                    for (var j = 0; j < u.trace.length - 1;) { var T = u.trace[j]; var N = u.trace[++j]; N.x -= 0.4 * (N.x - T.x); N.y -= 0.4 * (N.y - T.y); }
                    ctx.fillStyle = u.f; for (var j = 0; j < u.trace.length; j++) ctx.fillRect(u.trace[j].x, u.trace[j].y, 1, 1);
                }
                ctx.fillStyle = "#ffd700"; ctx.font = "italic bold 25px Arial"; ctx.textAlign = "center"; ctx.fillText("Amit ❤️ Aarti", width / 2, height / 2);
                window.requestAnimationFrame(loop);
            };
            loop();
            setTimeout(() => { document.getElementById('heart-canvas-container').style.display = 'none'; document.getElementById('parallax-section').style.display = 'block'; }, 10000);
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
